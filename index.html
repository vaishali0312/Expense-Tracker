<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1209;
      --paper: #f5f0e8;
      --cream: #ede6d6;
      --accent: #c84b2f;
      --accent-light: #f0cfc8;
      --muted: #8a7d6b;
      --border: #c8bfad;
      --green: #2a6b3f;
      --green-light: #c8e6d3;
    }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
      background-image:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 27px,
          rgba(0,0,0,0.04) 27px,
          rgba(0,0,0,0.04) 28px
        );
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
    }

    header {
      border-bottom: 3px double var(--ink);
      padding-bottom: 1.2rem;
      margin-bottom: 2.5rem;
    }

    .ledger-label {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.3rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 900;
      line-height: 1;
      color: var(--ink);
    }

    h1 span {
      color: var(--accent);
    }

    .date-stamp {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 0.4rem;
    }

    /* ── FORM ── */
    .form-card {
      background: var(--cream);
      border: 1.5px solid var(--border);
      border-radius: 2px;
      padding: 1.8rem;
      margin-bottom: 2rem;
      box-shadow: 4px 4px 0 var(--border);
    }

    .form-card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      margin-bottom: 1.2rem;
      color: var(--ink);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 2fr auto;
      gap: 0.75rem;
      align-items: end;
    }

    .field label {
      display: block;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }

    .field input {
      width: 100%;
      background: var(--paper);
      border: 1.5px solid var(--border);
      border-radius: 2px;
      padding: 0.6rem 0.75rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      color: var(--ink);
      transition: border-color 0.15s;
      outline: none;
    }

    .field input:focus {
      border-color: var(--accent);
    }

    .field input.error {
      border-color: var(--accent);
      background: #fff5f5;
    }

    .btn-add {
      background: var(--ink);
      color: var(--paper);
      border: none;
      border-radius: 2px;
      padding: 0.6rem 1.4rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
      height: fit-content;
    }

    .btn-add:hover { background: var(--accent); }
    .btn-add:active { transform: scale(0.97); }
    .btn-add:disabled { opacity: 0.45; cursor: not-allowed; }

    .error-msg {
      color: var(--accent);
      font-size: 0.72rem;
      margin-top: 0.75rem;
      padding: 0.5rem 0.75rem;
      background: var(--accent-light);
      border-left: 3px solid var(--accent);
    }

    .success-msg {
      color: var(--green);
      font-size: 0.72rem;
      margin-top: 0.75rem;
      padding: 0.5rem 0.75rem;
      background: var(--green-light);
      border-left: 3px solid var(--green);
    }

    /* ── TOTALS ── */
    .totals-section {
      margin-bottom: 2rem;
    }

    .section-title {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.4rem;
      margin-bottom: 1rem;
    }

    .totals-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 0.75rem;
    }

    .total-chip {
      background: var(--cream);
      border: 1.5px solid var(--border);
      border-radius: 2px;
      padding: 0.9rem 1rem;
      box-shadow: 2px 2px 0 var(--border);
    }

    .total-chip-cat {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.2rem;
    }

    .total-chip-amt {
      font-size: 1.3rem;
      font-weight: 500;
      color: var(--ink);
    }

    .grand-total {
      background: var(--ink);
      color: var(--paper);
      border: none;
    }

    .grand-total .total-chip-cat { color: var(--border); }
    .grand-total .total-chip-amt { color: var(--paper); }

    .empty-totals {
      font-size: 0.8rem;
      color: var(--muted);
      font-style: italic;
    }

    /* ── LEDGER TABLE ── */
    .ledger-section {}

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }

    thead tr {
      border-bottom: 2px solid var(--ink);
    }

    th {
      text-align: left;
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0 0 0.5rem;
      font-weight: 400;
    }

    th:last-child { text-align: right; }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }

    tbody tr:hover { background: var(--cream); }

    td {
      padding: 0.65rem 0;
      color: var(--ink);
    }

    td:last-child { text-align: right; }

    .td-id { color: var(--muted); font-size: 0.72rem; width: 3rem; }
    .td-cat { font-weight: 500; }
    .td-date { color: var(--muted); font-size: 0.75rem; }
    .td-amt { font-size: 0.95rem; }

    .btn-del {
      background: none;
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      padding: 0.2rem 0.45rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-del:hover { border-color: var(--accent); color: var(--accent); }

    .empty-ledger {
      font-size: 0.8rem;
      color: var(--muted);
      font-style: italic;
      padding: 1.5rem 0;
      text-align: center;
    }

    .loading { opacity: 0.5; pointer-events: none; }

    @media (max-width: 540px) {
      .form-row { grid-template-columns: 1fr 1fr; }
      .btn-add { grid-column: 1/-1; }
      .td-date { display: none; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;
    const API = 'http://localhost:3001';

    function formatDate(iso) {
      return new Date(iso).toLocaleDateString('en-IN', {
        day: '2-digit', month: 'short', year: 'numeric'
      });
    }

    function App() {
      const [expenses, setExpenses] = useState([]);
      const [totals, setTotals] = useState({});
      const [amount, setAmount] = useState('');
      const [category, setCategory] = useState('');
      const [errors, setErrors] = useState([]);
      const [flash, setFlash] = useState('');
      const [loading, setLoading] = useState(false);
      const [fetching, setFetching] = useState(true);

      const fetchData = useCallback(async () => {
        try {
          const res = await fetch(`${API}/expenses`);
          const data = await res.json();
          setExpenses(data.expenses.slice().reverse());
          setTotals(data.totals);
        } catch {
          setErrors(['Cannot connect to server. Make sure the backend is running on port 3001.']);
        } finally {
          setFetching(false);
        }
      }, []);

      useEffect(() => { fetchData(); }, [fetchData]);

      const handleAdd = async () => {
        setErrors([]);
        setFlash('');
        setLoading(true);
        try {
          const res = await fetch(`${API}/expenses`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ amount, category }),
          });
          const data = await res.json();
          if (!res.ok) {
            setErrors(data.errors || ['Unknown error.']);
          } else {
            setAmount('');
            setCategory('');
            setFlash(`Added ₹${data.amount} · ${data.category}`);
            fetchData();
          }
        } catch {
          setErrors(['Network error. Is the server running?']);
        } finally {
          setLoading(false);
        }
      };

      const handleDelete = async (id) => {
        await fetch(`${API}/expenses/${id}`, { method: 'DELETE' });
        fetchData();
      };

      const grandTotal = Object.values(totals).reduce((s, v) => s + v, 0);
      const today = new Date().toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

      return (
        <div className="container">
          <header>
            <div className="ledger-label">Personal Finance Ledger</div>
            <h1>Expense <span>Tracker</span></h1>
            <div className="date-stamp">{today}</div>
          </header>

          {/* ── ADD FORM ── */}
          <div className="form-card">
            <h2>Record a new expense</h2>
            <div className="form-row">
              <div className="field">
                <label>Amount (₹)</label>
                <input
                  type="number"
                  min="0.01"
                  step="0.01"
                  placeholder="0.00"
                  value={amount}
                  className={errors.length ? 'error' : ''}
                  onChange={e => setAmount(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && handleAdd()}
                />
              </div>
              <div className="field">
                <label>Category</label>
                <input
                  type="text"
                  placeholder="e.g. Food, Transport…"
                  value={category}
                  className={errors.length ? 'error' : ''}
                  onChange={e => setCategory(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && handleAdd()}
                />
              </div>
              <button className="btn-add" onClick={handleAdd} disabled={loading}>
                {loading ? '…' : '+ Add'}
              </button>
            </div>
            {errors.length > 0 && <div className="error-msg">{errors.join(' · ')}</div>}
            {flash && <div className="success-msg">✓ {flash}</div>}
          </div>

          {/* ── TOTALS ── */}
          <div className="totals-section">
            <div className="section-title">Totals by Category</div>
            {fetching ? (
              <p className="empty-totals">Loading…</p>
            ) : Object.keys(totals).length === 0 ? (
              <p className="empty-totals">No expenses yet.</p>
            ) : (
              <div className="totals-grid">
                {Object.entries(totals).sort((a,b) => b[1]-a[1]).map(([cat, amt]) => (
                  <div className="total-chip" key={cat}>
                    <div className="total-chip-cat">{cat}</div>
                    <div className="total-chip-amt">₹{amt.toFixed(2)}</div>
                  </div>
                ))}
                <div className="total-chip grand-total">
                  <div className="total-chip-cat">Grand Total</div>
                  <div className="total-chip-amt">₹{grandTotal.toFixed(2)}</div>
                </div>
              </div>
            )}
          </div>

          {/* ── LEDGER ── */}
          <div className="ledger-section">
            <div className="section-title">All Entries</div>
            {fetching ? (
              <p className="empty-ledger">Loading…</p>
            ) : expenses.length === 0 ? (
              <p className="empty-ledger">Your ledger is empty. Add an expense above.</p>
            ) : (
              <table>
                <thead>
                  <tr>
                    <th>#</th>
                    <th>Category</th>
                    <th>Date</th>
                    <th>Amount</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody>
                  {expenses.map(e => (
                    <tr key={e.id}>
                      <td className="td-id">{String(e.id).padStart(3, '0')}</td>
                      <td className="td-cat">{e.category}</td>
                      <td className="td-date">{formatDate(e.date)}</td>
                      <td className="td-amt">₹{e.amount.toFixed(2)}</td>
                      <td>
                        <button className="btn-del" onClick={() => handleDelete(e.id)}>✕</button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
